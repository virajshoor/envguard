name: Envguard
description: Validate .env files against a typed .env.schema before bad config breaks your deploy.

inputs:
  env:
    description: Env file to validate.
    required: false
    default: .env
  schema:
    description: Schema file to validate against.
    required: false
    default: .env.schema
  strict:
    description: Fail when the env file contains keys missing from the schema.
    required: false
    default: 'false'
  json:
    description: Print machine-readable JSON.
    required: false
    default: 'false'
  secrets:
    description: Run local secret hygiene checks and print warnings.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install envguard dependencies
      shell: bash
      run: npm ci --omit=dev --prefix "$GITHUB_ACTION_PATH"

    - name: Run envguard
      shell: bash
      env:
        ENVGUARD_ENV: ${{ inputs.env }}
        ENVGUARD_SCHEMA: ${{ inputs.schema }}
        ENVGUARD_STRICT: ${{ inputs.strict }}
        ENVGUARD_JSON: ${{ inputs.json }}
        ENVGUARD_SECRETS: ${{ inputs.secrets }}
      run: |
        args=(check --env "$ENVGUARD_ENV" --schema "$ENVGUARD_SCHEMA")

        if [ "$ENVGUARD_STRICT" = "true" ]; then
          args+=(--strict)
        fi

        if [ "$ENVGUARD_JSON" = "true" ]; then
          args+=(--json)
        fi

        if [ "$ENVGUARD_SECRETS" = "true" ]; then
          args+=(--secrets)
        fi

        node "$GITHUB_ACTION_PATH/bin/envguard.js" "${args[@]}"
